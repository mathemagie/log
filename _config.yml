# Site settings
title: Mathemagie Blog
description: Articles techniques sur l'IA, les LLM et les workflows de développement.
author: mathemagie
lang: fr

# GitHub Pages serves a project repo named "blog" at:
#   https://mathemagie.github.io/blog
# These two values must match that URL.
url: "https://mathemagie.github.io"
baseurl: "/blog"

# Clean post URLs: /blog/<title>/ — no dates or categories (SEO best practice).
permalink: /:title/

# Build settings — load minima 3.x as a remote theme to get skin support
# (GitHub Pages bundles minima 2.5.1, which has no skins).
remote_theme: jekyll/minima
minima:
  skin: dark
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# Don't process these in the build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .gitignore
