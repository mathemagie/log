# Site settings
title: Mathemagie Blog
description: Articles techniques sur l'IA, les LLM et les workflows de développement.
author: mathemagie
lang: fr

# GitHub Pages serves a project repo named "log" at:
#   https://mathemagie.github.io/log
# These two values must match that URL.
url: "https://mathemagie.github.io"
baseurl: "/log"

# Clean post URLs: /blog/<title>/ — no dates or categories (SEO best practice).
permalink: /:title/

# Build settings — Hacker theme (terminal look), bundled with GitHub Pages.
# It only provides "default" and "post" layouts, so the homepage lists
# posts itself (see index.md).
theme: jekyll-theme-hacker
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Don't process these in the build output.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .gitignore
